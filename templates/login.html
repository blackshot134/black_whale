{% extends "base.html" %}

{% block title %}Login - Black Whale{% endblock %}

{% block nav_links %}
<a href="/">HOME</a>
<a href="/login">LOGIN</a>
<a href="/register">REGISTER</a>
{% endblock %}

{% block content %}
<div style="max-width: 500px; margin: 0 auto; background: rgba(255,255,255,0.05); border-radius: 30px; padding: 40px;">
    <h2 style="text-align: center; margin-bottom: 30px;">Welcome Back</h2>
    
    <form id="loginForm">
        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px; color: #ccc;">Email Address</label>
            <input type="email" id="email" required 
                   style="width: 100%; padding: 12px; background: rgba(0,0,0,0.5); border: 1px solid #333; border-radius: 10px; color: white;">
        </div>
        
        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px; color: #ccc;">Password</label>
            <input type="password" id="password" required 
                   style="width: 100%; padding: 12px; background: rgba(0,0,0,0.5); border: 1px solid #333; border-radius: 10px; color: white;">
        </div>
        
        <button type="submit" class="btn" style="width: 100%;">Login</button>
    </form>
    
    <p style="text-align: center; margin-top: 20px; color: #aaa;">
        Don't have an account? <a href="/register" style="color: #00d4ff;">Register</a>
    </p>
    
    <div id="message" style="margin-top: 20px; text-align: center;"></div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();
    const messageDiv = document.getElementById('message');
    
    messageDiv.innerHTML = '<span style="color: #00d4ff;">⏳ Logging in...</span>';
    
    const formData = new URLSearchParams();
    formData.append('email', email);
    formData.append('password', password);
    
    try {
        const response = await fetch('/api/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: formData
        });
        
        const result = await response.json();
        
        if (result.success) {
            messageDiv.innerHTML = '<span style="color: #00ff88;">✅ Login successful! Redirecting...</span>';
            // ریدایرکت به داشبورد
            window.location.href = result.redirect || '/dashboard';
        } else {
            messageDiv.innerHTML = `<span style="color: #ff4444;">❌ ${result.message}</span>`;
        }
    } catch (error) {
        messageDiv.innerHTML = '<span style="color: #ff4444;">❌ Connection error. Please try again.</span>';
        console.error('Login error:', error);
    }
});
</script>
{% endblock %}
